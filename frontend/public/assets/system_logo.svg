<svg width="360" height="80" viewBox="0 0 360 80" xmlns="http://www.w3.org/2000/svg">

  <!-- Icon: 64×64 navy square -->
  <rect x="0" y="8" width="64" height="64" rx="14" fill="#0f172a"/>

  <!-- P spine: vertical rounded rect -->
  <rect x="16" y="16" width="8.5" height="48" rx="4" fill="#38bdf8"/>

  <!-- P bowl arc -->
  <path d="M24.5 22 Q56 22 56 38 Q56 54 24.5 54"
        fill="none" stroke="#38bdf8" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arc endpoint nodes (translucent) -->
  <circle cx="24.5" cy="22" r="3.5" fill="#38bdf8" opacity="0.4"/>
  <circle cx="24.5" cy="54" r="3.5" fill="#38bdf8" opacity="0.4"/>

  <!-- Trailing mint dots -->
  <circle cx="34" cy="65" r="4.5" fill="#10b981" opacity="0.9"/>
  <circle cx="45" cy="65" r="3"   fill="#10b981" opacity="0.5"/>
  <circle cx="54" cy="65" r="1.8" fill="#10b981" opacity="0.25"/>

  <!-- Wordmark -->
  <text x="80" y="46"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
        font-size="30" font-weight="500"
        letter-spacing="-0.5px">
    <tspan fill="#0f172a">Probably</tspan><tspan fill="#0284c7">Fresh</tspan>
  </text>

  <!-- Descriptor -->
  <text x="81" y="64"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
        font-size="10.5" font-weight="400"
        letter-spacing="0.18em"
        fill="#94a3b8">ANALYTICS PLATFORM</text>

</svg>
<body>

        exports:[['analytic_result_2026_04_16.csv','2026-04-16','840 000','41 MB','ready'],['analytic_result_2026_04_16.parquet','2026-04-16','840 000','18 MB','ready'],['analytic_result_2026_04_15.csv','2026-04-15','838 200','40 MB','ready'],['nightly_export_2026_04_16.zip','2026-04-16','-','92 MB','processing']],
        connections:[['ClickHouse JDBC','jdbc:clickhouse://ch-server:8123/default',database],['S3 Endpoint','https://s3.ru-3.storage.selcloud.ru',cloud],['Grafana URL','http://grafana:3000',chart],['Airflow URL','http://airflow:8080',workflow]],
        feat:[['bulk_buyer',486300,57.9],['weekday_shopper',451120,53.7],['delivery_user',389504,46.4],['morning_shopper',312100,37.2],['prefers_card',291640,34.7],['prefers_cash',224100,26.7],['weekend_shopper',205540,24.5],['night_shopper',168900,20.1],['low_cost_buyer',121440,14.5]],
        fdefs:{
          bulk_buyer:{cat:'basket',ru:['Покупатель с крупными покупками','Средний чек клиента строго больше 1000.','Выделяет клиентов с дорогими или объёмными корзинами.','Признак = 1, если avg_total_amount > 1000 и purchases_all_time > 0.','Вся доступная история покупок.','Средний чек > 1000.','Средний чек 1000 и ниже либо покупок нет.','Средний чек клиента выше 1000.'],en:['Bulk buyer','Average basket is strictly above 1000.','Highlights customers with expensive or large baskets.','Feature = 1 when avg_total_amount > 1000 and purchases_all_time > 0.','Full available purchase history.','Average basket > 1000.','Average basket is 1000 or below, or there are no purchases.','The customer average basket is above 1000.']},

w+)\}/g,(_,k)=>o[k]??'')} function cat(k){return {payment:{ru:'Оплата',en:'Payment'},time:{ru:'Время',en:'Time'},basket:{ru:'Чек',en:'Basket amount'},delivery:{ru:'Доставка',en:'Delivery'}}[k][state.lang]} function sug(s){return s==='future'?txt('fm.future'):s==='metadata'?txt('fm.metadata'):txt('fm.implemented')} function nice(m){const r=m/4,mag=Math.pow(10,Math.floor(Math.log10(r))),res=r/mag; if(res<=1)return mag; if(res<=2)return 2*mag; if(res<=5)return 5*mag; return 10*mag} function short(v){if(v>=1e6)return `${Math.round(v/1e5)/10}M`; if(v>=1e3)return `${Math.round(v/100)/10}k`; return String(v)} function smooth(ps){if(ps.length<2)return ''; let p=`M ${ps[0].x} ${ps[0].y}`; for(let i=0;i<ps.length-1;i++){const c=ps[i],n=ps[i+1],mx=(c.x+n.x)/2; p+=` C ${mx} ${c.y}, ${mx} ${n.y}, ${n.x} ${n.y}`} return p} function icon(type){return ({store:store,pulse:pulse,users:users,layers:layers}[type]||layers)()} function meta(title,body){return `<div class="mblock"><div class="ey">${title}</div><div style="margin-top:8px;line-height:1.75;color:var(--muted);">${body}</div></div>`}

        return `<section><div><h1 class="title">${t('about.title','О проекте','About project')}</h1><p class="sub">${t('about.sub','Короткое инженерное описание платформы ProbablyFresh и её текущего end-to-end data pipeline.','A concise engineering overview of the ProbablyFresh platform and its current end-to-end data pipeline.')}</p></div><div class="about-grid" style="margin-top:16px"><div class="card"><div class="head2"><span class="circle">${info()}</span><div><h2>ProbablyFresh Analytics Platform</h2><div class="txt">${text[state.lang].about.desc}</div></div></div></div><div class="card"><div class="head2"><span class="circle">${workflow()}</span><div><h2>${t('about.arch','Архитектура пайплайна','Pipeline architecture')}</h2><ul class="bul">${text[state.lang].about.arch.map(x=>`<li>${x}</li>`).join('')}</ul></div></div></div><div class="card"><div class="head2"><span class="circle">${layers()}</span><div><h2>${t('about.tech','Используемые технологии','Technology stack')}</h2><ul class="bul">${text[state.lang].about.techs.map(x=>`<li>${x}</li>`).join('')}</ul></div></div></div><div class="card"><div class="head2"><span class="circle">${sparkles()}</span><div><h2>${t('about.high','Особенности проекта','Project highlights')}</h2><ul class="bul">${text[state.lang].about.highs.map(x=>`<li>${x}</li>`).join('')}</ul></div></div></div><div class="card" style="grid-column:1/-1"><div class="head2"><span class="circle">${book()}</span><div><h2>${t('about.goal','Назначение','Purpose')}</h2><div class="txt">${t('about.goalText','Проект предназначен для обучения, демонстрации и отработки навыков Data Engineering: от генерации событий и потоковой передачи до витрин, экспорта и UI-навигации по результатам.','The project is intended for learning, demonstration, and practicing Data Engineering skills: from event generation and streaming to marts, exports, and UI navigation through results.')}</div></div></div></div></div></section>`
      }
      function docsPage(){
        const ds=text[state.lang].docs.sections;
        return `<section><div><h1 class="title">${text[state.lang].docs.title}</h1><p class="sub">${text[state.lang].docs.sub}</p></div><div class="dsticky"><nav class="doc-nav">${docIds.map(id=>`<button class="doc-link ${state.doc===id?'on':''}" data-doc="${id}">${icons[id==='global'?'documentation':id==='quality'?'data-quality':id]()||book()}<span>${id==='global'?text[state.lang].docs.iface:ds[id][0]}</span></button>`).join('')}</nav></div><div class="card" style="margin-bottom:18px"><div class="head2"><span class="circle">${book()}</span><div><h2>${text[state.lang].docs.note}</h2><div class="txt">${text[state.lang].docs.noted}</div></div></div></div>${docIds.map(id=>docSection(id,ds[id],id==='global'?text[state.lang].docs.iface:ds[id][0])).join('')}</section>`
      }
      function docSection(id,entry,label){
        return `<section class="card dsec" id="doc-${id}"><div class="head2"><span class="circle">${icons[id==='global'?'documentation':id==='quality'?'data-quality':id]()||book()}</span><div><h2>${label}</h2><div class="txt">${entry[1]}</div></div></div><div class="doc-grid" style="margin-top:18px">${entry[2].map(item=>`<div class="doc-box"><p><strong>${item[0]}:</strong> ${item[1]}</p></div>`).join('')}</div></section>`
      }
      function bind(){
        document.querySelectorAll('[data-action]').forEach(b=>b.onclick=()=>startAction(b.dataset.action));
        document.querySelectorAll('[data-feature]').forEach(b=>b.onclick=()=>{state.selected=b.dataset.feature; state.modal={type:'feature',key:b.dataset.feature}; save(); renderModal()});
        document.querySelector('[data-toggle-table]')?.addEventListener('click',()=>{state.table=!state.table; save(); renderPage()});
        document.querySelector('#export-search')?.addEventListener('input',e=>{state.exportQuery=e.target.value; renderPage()});
        document.querySelectorAll('[data-export-view]').forEach(b=>b.onclick=()=>toast('ok',t('exp.preview','Предпросмотр открыт','Preview opened'),b.dataset.exportView));
        document.querySelectorAll('[data-export-download]').forEach(b=>b.onclick=()=>toast('ok',t('exp.downloadReady','Скачивание подготовлено','Download prepared'),b.dataset.exportDownload));
        document.querySelector('[data-safe-toggle]')?.addEventListener('click',()=>{state.safe=!state.safe; save(); renderPage(); toast('ok',txt('toast.safe'),state.safe?txt('toast.safeOn'):txt('toast.safeOff'))});
        document.querySelectorAll('[data-doc]').forEach(b=>b.onclick=()=>{state.doc=b.dataset.doc; save(); renderPage(); requestAnimationFrame(()=>document.getElementById('doc-'+b.dataset.doc)?.scrollIntoView({behavior:'smooth',block:'start'}))});
      }
      function startAction(key){
        if(state.safe&&key==='mart-refresh'){toast('warn',txt('toast.blocked'),txt('toast.blockedd')); return}
        state.modal={type:'action',key,pq:false}; save(); renderModal()
      }
      function renderModal(){
        const m=state.modal; if(!m){dom.mbg.classList.remove('on'); dom.mbg.innerHTML=''; return}
        dom.mbg.classList.add('on');
        if(m.type==='feature'){
          const d=data.fdefs[m.key]; const src=featureSource(m.key);
          const vals=d[state.lang];
          dom.mbg.innerHTML=`<div class="modal"><div class="mhead"><div><div class="meta">${cat(d.cat)}</div><h2 class="mtitle">${vals[0]}</h2><p class="mdesc mono" style="margin-top:10px">${m.key}</p><p class="mdesc">${vals[1]}</p></div><button class="x" data-close>×</button></div>${meta(txt('modal.fkey'),m.key)}${meta(txt('modal.why'),vals[2])}${meta(txt('modal.calc'),vals[3])}${meta(txt('modal.look'),vals[4])}${meta(txt('modal.thr'),vals[5])}${meta(txt('modal.fields'),src.fields)}${meta(txt('modal.tables'),src.tables)}${meta(txt('modal.zero'),vals[6])}${meta(txt('modal.one'),vals[7])}</div>`
        } else {
          const title=atext(m.key)[0]; const isEtl=m.key==='run-etl';
          dom.mbg.innerHTML=`<div class="modal"><div class="mhead"><div><h2 class="mtitle">${fmt(txt('modal.run'),{t:title})}</h2><p class="mdesc">${atext(m.key)[1]}</p></div><button class="x" data-close>×</button></div><div class="warnbox">${txt('modal.warn')}</div>${isEtl?`<label class="check" style="margin-top:16px"><input type="checkbox" id="pq" ${m.pq?'checked':''}/><div><div style="font-weight:800">${txt('modal.pq')}</div><div class="rmeta" style="margin-top:6px">${txt('modal.pqd')}</div></div></label>${m.pq?`<div class="pq" style="margin-top:14px">${txt('modal.pqw')}</div>`:''}`:''}<div class="mact"><button class="small" data-close>${txt('modal.cancel')}</button><button class="prim" data-confirm>${txt('modal.go')}</button></div></div>`
        }
        dom.mbg.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>{state.modal=null; save(); renderModal()});
        dom.mbg.onclick=e=>{if(e.target===dom.mbg){state.modal=null; save(); renderModal()}};
        dom.mbg.querySelector('#pq')?.addEventListener('change',e=>{state.modal.pq=e.target.checked; save(); renderModal()});
        dom.mbg.querySelector('[data-confirm]')?.addEventListener('click',runAction);
      }
      function runAction(){
        const key=state.modal.key; const parquet=!!state.modal.pq;
        dom.mbg.innerHTML=`<div class="modal"><div class="mhead"><div><h2 class="mtitle">${txt('modal.running')}</h2><p class="mdesc">${txt('modal.runningd')}</p></div></div><div class="loading"><img src="../assets/load.svg" alt="Loading" /><div class="rmeta">${atext(key)[0]}${parquet?' • Parquet enabled':''}</div></div></div>`;
        setTimeout(()=>{
          state.modal=null;
          state.runs=[{id:'r'+Math.random().toString(36).slice(2),key,status:'success',started:Date.now()},...state.runs].slice(0,8);
          save(); render();
          toast('ok',txt('toast.start'),`${atext(key)[0]}${parquet?' • Parquet':''}`)
        },1400)
      }
      function featureSource(key){
        if(key.includes('card')||key.includes('cash')) return {fields:'payment_method, payment_method_norm, payment_share',tables:'purchases_mart'};
        if(key.includes('week')||key.includes('morning')||key.includes('night')) return {fields:'purchase_dt, purchase_hour, is_weekend',tables:'purchases_mart'};
        if(key.includes('delivery')) return {fields:'is_delivery, order_channel',tables:'purchases_mart'};
        return {fields:'total_amount, purchases_all_time, aggregated customer metrics',tables:'purchases_mart'}
      }
      function flabel(key){const d=data.fdefs[key]; return d?d[state.lang][0]:key}
      function fdesc(key){const d=data.fdefs[key]; return d?d[state.lang][1]:key}
      function toast(kind,title,body){
        const el=document.createElement('div'); el.className=`toast ${kind}`; el.innerHTML=`<div class="th"><div class="tt">${title}</div><button class="x" style="width:28px;height:28px;font-size:16px" type="button">×</button></div><div class="tb">${body}</div>`;
        const closer=()=>el.remove(); el.querySelector('button').onclick=closer; dom.toasts.prepend(el); setTimeout(closer,3200)
      }
      function escapeHtml(v){return String(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
      function ingChart(){
        const pts=data.ing.map(x=>x[2]); const max=Math.max(...pts); const step=nice(max); const top=Math.ceil(max/step)*step; const ticks=Array.from({length:5},(_,i)=>i*step).filter(v=>v<=top);
        const w=960,h=360,l=72,r=36,t=34,b=88,iw=w-l-r,ih=h-t-b;
        const ps=data.ing.map((d,i)=>({x:l+i*(iw/(data.ing.length-1)),y:t+ih-(d[2]/top)*ih,v:d[2],day:d[0],date:d[1]}));
        const line=smooth(ps); const area=`${line} L ${ps.at(-1).x} ${t+ih} L ${ps[0].x} ${t+ih} Z`;
        return `<div class="chart"><svg class="svg" viewBox="0 0 ${w} ${h}" role="img" aria-label="Ingestion chart"><defs><linearGradient id="ing-fill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(15,23,42,.20)"/><stop offset="100%" stop-color="rgba(15,23,42,0)"/></linearGradient></defs>${ticks.map(v=>{const y=t+ih-(v/top)*ih; return `<g><line x1="${l}" y1="${y}" x2="${w-r}" y2="${y}" stroke="rgba(148,163,184,.28)" stroke-dasharray="4 10"/><text x="${l-12}" y="${y+5}" text-anchor="end" fill="var(--muted)" font-size="14">${short(v)}</text></g>`}).join('')}<path d="${area}" fill="url(#ing-fill)"/><path d="${line}" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>${ps.map(p=>`<g><text x="${p.x}" y="${h-42}" text-anchor="middle" fill="var(--muted)" font-size="14" font-weight="700">${day(p.day)}</text><text x="${p.x}" y="${h-20}" text-anchor="middle" fill="var(--muted)" font-size="13">${p.date}</text></g>`).join('')}<text x="${l}" y="18" fill="var(--muted)" font-size="13" font-weight="700">${t('overview.ingY','Количество загрузок','Rows ingested')}</text><text x="${w/2}" y="${h-54}" text-anchor="middle" fill="var(--muted)" font-size="13" font-weight="700">${t('overview.ingX','Дата','Date')}</text><text x="${w/2}" y="${h-2}" text-anchor="middle" fill="var(--muted)" font-size="28" font-weight="800">2026</text></svg></div>`
      }
      function dupChart(){
        const vals=data.dup; const top=100; const ticks=[0,25,50,75,90]; const w=1120,h=330,l=58,r=30,t=24,b=64,iw=w-l-r,ih=h-t-b;
        const ps=vals.map((v,i)=>({x:l+i*(iw/(vals.length-1)),y:t+ih-(v/top)*ih,v}));
        const line=smooth(ps); const area=`${line} L ${ps.at(-1).x} ${t+ih} L ${ps[0].x} ${t+ih} Z`;
        return `<div class="chart"><svg class="svg" viewBox="0 0 ${w} ${h}"><defs><linearGradient id="dup-fill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(15,23,42,.18)"/><stop offset="100%" stop-color="rgba(15,23,42,0)"/></linearGradient></defs>${ticks.map(v=>{const y=t+ih-(v/top)*ih; return `<g><line x1="${l}" y1="${y}" x2="${w-r}" y2="${y}" stroke="rgba(148,163,184,.28)" stroke-dasharray="4 10"/><text x="${l-10}" y="${y+5}" text-anchor="end" fill="var(--muted)" font-size="14">${v}%</text></g>`}).join('')}<path d="${area}" fill="url(#dup-fill)"/><path d="${line}" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>${ps.map((p,i)=>`<text x="${p.x}" y="${h-16}" text-anchor="middle" fill="var(--muted)" font-size="14">${state.lang==='ru'?`Запуск №${i+1}`:`Run ${i+1}`}</text>`).join('')}</svg></div>`
      }
      function payChart(){
        const total=data.pay.reduce((s,x)=>s+x[1],0); const cx=290,cy=170,r=102,sw=32; let acc=-Math.PI/2;
        const arcs=data.pay.map(([k,v,,c])=>{const a=(v/total)*Math.PI*2,st=acc,en=acc+a; acc=en+0.045; return {k,v,c,st,en,p:Math.round((v/total)*100)}});
        return `<div style="display:grid;grid-template-columns:minmax(0,1fr) 260px;gap:20px;align-items:center"><div>${donut(arcs,cx,cy,r,sw)}<div class="tooltip" style="width:max-content;transform:translate(18px,-6px)">${payTip(arcs[1])}</div></div><div class="legend">${arcs.map(a=>`<div class="lg"><div class="lgl"><span class="sw" style="background:${a.c}"></span><span>${payName(a.k)}</span></div><strong>${a.p}% (${a.v})</strong></div>`).join('')}</div></div>`
      }
      function payTip(a){return `${payName(a.k)}: ${a.v} ${state.lang==='ru'?'покупок':'purchases'} (${a.p}%)`}
      function payName(k){return ({card:state.lang==='ru'?'Карта':'Card',cash:state.lang==='ru'?'Наличные':'Cash',sbp:'SBP',other:state.lang==='ru'?'Другое':'Other'})[k]||k}
      function donut(arcs,cx,cy,r,sw){return `<svg class="svg" viewBox="0 0 580 340">${arcs.map(a=>`<path d="${arc(cx,cy,r,a.st,a.en)}" fill="none" stroke="${a.c}" stroke-width="${sw}" stroke-linecap="round"/>`).join('')}<circle cx="${cx}" cy="${cy}" r="58" fill="var(--surface2)"/><text x="${cx}" y="${cy-4}" text-anchor="middle" fill="var(--text)" font-size="28" font-weight="900">${totalRows()}</text><text x="${cx}" y="${cy+22}" text-anchor="middle" fill="var(--muted)" font-size="14">${state.lang==='ru'?'покупок':'purchases'}</text></svg>`}
      function totalRows(){return data.pay.reduce((s,x)=>s+x[1],0)}
      function arc(cx,cy,r,st,en){const x1=cx+r*Math.cos(st),y1=cy+r*Math.sin(st),x2=cx+r*Math.cos(en),y2=cy+r*Math.sin(en),la=en-st>Math.PI?1:0; return `M ${x1} ${y1} A ${r} ${r} 0 ${la} 1 ${x2} ${y2}`}
      function $(s){return document.querySelector(s)}
      function svg(path,view='0 0 24 24'){return `<svg viewBox="${view}" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">${path}</svg>`}
      function gauge(){return svg('<path d="M4.5 16a7.5 7.5 0 1 1 15 0"/><path d="M12 12l3-3"/>')} function workflow(){return svg('<rect x="3" y="4" width="6" height="6" rx="1.5"/><rect x="15" y="14" width="6" height="6" rx="1.5"/><path d="M9 7h3a3 3 0 0 1 3 3v4"/><path d="M12 17h3"/>')} function shield(){return svg('<path d="M12 3l7 3v5c0 4.5-3 7.5-7 10-4-2.5-7-5.5-7-10V6l7-3z"/>')} function grid(){return svg('<rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/>')} function upload(){return svg('<path d="M12 16V4"/><path d="m7 9 5-5 5 5"/><path d="M5 19h14"/>')} function gear(){return svg('<circle cx="12" cy="12" r="3.5"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 1.56V21a2 2 0 1 1-4 0v-.04A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1H3a2 2 0 1 1 0-4h.04A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.56V3a2 2 0 1 1 4 0v.04A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c0 .65.37 1.24.96 1.53H21a2 2 0 1 1 0 4h-.04c-.59.29-.96.88-.96 1.47z"/>')} function info(){return svg('<circle cx="12" cy="12" r="9"/><path d="M12 10v6"/><path d="M12 7h.01"/>')} function book(){return svg('<path d="M5 5.5A2.5 2.5 0 0 1 7.5 3H20v16H7.5A2.5 2.5 0 0 0 5 21.5z"/><path d="M5 5.5V19a2 2 0 0 0 2 2"/><path d="M9 7h7"/><path d="M9 11h7"/>')} function store(){return svg('<path d="M4 9h16"/><path d="M6 9V5h12v4"/><path d="M6 9v10h12V9"/><path d="M10 13h4"/>')} function pulse(){return svg('<path d="M3 12h4l2-5 4 10 2-5h6"/>')} function users(){return svg('<path d="M16 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="10" cy="7" r="4"/><path d="M20 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>')} function layers(){return svg('<path d="m12 3 8 4.5-8 4.5-8-4.5 8-4.5Z"/><path d="m4 12 8 4.5 8-4.5"/><path d="m4 16.5 8 4.5 8-4.5"/>')} function database(){return svg('<ellipse cx="12" cy="5" rx="7" ry="3"/><path d="M5 5v6c0 1.7 3.1 3 7 3s7-1.3 7-3V5"/><path d="M5 11v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6"/>')} function cloud(){return svg('<path d="M7 18a4 4 0 1 1 .8-7.92A5 5 0 0 1 17.5 9 3.5 3.5 0 1 1 18 18Z"/>')} function chart(){return svg('<path d="M4 19V5"/><path d="M4 19h16"/><path d="m7 14 4-4 3 3 4-6"/>')} function sparkles(){return svg('<path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/><path d="M5 16l.8 2.2L8 19l-2.2.8L5 22l-.8-2.2L2 19l2.2-.8L5 16z"/>')} function zap(){return svg('<path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z"/>')} function flask(){return svg('<path d="M10 2v6l-5.5 9.5A2 2 0 0 0 6.2 21h11.6a2 2 0 0 0 1.7-3L14 8V2"/><path d="M8 12h8"/>')} function play(){return svg('<path d="M8 5v14l11-7Z"/>')} function shieldCheck(){return svg('<path d="M12 3l7 3v5c0 4.5-3 7.5-7 10-4-2.5-7-5.5-7-10V6l7-3z"/><path d="m9 12 2 2 4-4"/>')} function eye(){return svg('<path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"/><circle cx="12" cy="12" r="3"/>')} function download(){return svg('<path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/>')}
    })();
  </script>
</body>

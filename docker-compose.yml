services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DB}
    volumes:
      - mongodb_data:/data/db

  airflow-postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=${AIRFLOW_DB_USER:-airflow}
      - POSTGRES_PASSWORD=${AIRFLOW_DB_PASSWORD:-airflow}
      - POSTGRES_DB=${AIRFLOW_DB_NAME:-airflow}
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER:-airflow} -d ${AIRFLOW_DB_NAME:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow:
    image: apache/airflow:2.9.3
    depends_on:
      airflow-postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-postgres:5432/${AIRFLOW_DB_NAME:-airflow}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY:-1zBAecuCb4y6p0bDovyxSfNS0giHdueO2Pg5JOsFXSQ=}
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=false
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      - AIRFLOW_ADMIN_USER=${AIRFLOW_ADMIN_USER:-admin}
      - AIRFLOW_ADMIN_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:-admin}
      - AIRFLOW_ADMIN_EMAIL=${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
      - CH_HOST=${CH_HOST:-clickhouse}
      - CH_PORT=${CH_PORT:-8123}
      - CH_USER=${CH_USER:-default}
      - CH_PASSWORD=${CH_PASSWORD:-}
      - CH_DATABASE=${CH_DATABASE:-probablyfresh_mart}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://localhost:9000}
      - MINIO_REGION=${MINIO_REGION:-ru-3}
      - MINIO_BUCKET=${MINIO_BUCKET:-analytics}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace
    command:
      - bash
      - -lc
      - |
        airflow db migrate &&
        if airflow users list | grep -E "^[[:space:]]*[0-9]+[[:space:]]*\\|[[:space:]]*$${AIRFLOW_ADMIN_USER}[[:space:]]*\\|" >/dev/null; then
          echo "Airflow admin user '$${AIRFLOW_ADMIN_USER}' already exists, skipping create."
        else
          airflow users create \
            --username "$${AIRFLOW_ADMIN_USER}" \
            --password "$${AIRFLOW_ADMIN_PASSWORD}" \
            --firstname Admin \
            --lastname User \
            --role Admin \
            --email "$${AIRFLOW_ADMIN_EMAIL}"
        fi
        airflow scheduler &
        exec airflow webserver
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()\""]
      interval: 15s
      timeout: 10s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: probablyfresh-app:local
    depends_on:
      - mongodb
      - kafka
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      - MONGO_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB}?authSource=admin
      - MONGO_DB=${MONGO_DB}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC_STORES=${KAFKA_TOPIC_STORES}
      - KAFKA_TOPIC_PRODUCTS=${KAFKA_TOPIC_PRODUCTS}
      - KAFKA_TOPIC_CUSTOMERS=${KAFKA_TOPIC_CUSTOMERS}
      - KAFKA_TOPIC_PURCHASES=${KAFKA_TOPIC_PURCHASES}
      - FERNET_KEY=${FERNET_KEY}
      - CLICKHOUSE_JDBC_JAR=/opt/jars/clickhouse-jdbc-0.9.6-all-dependencies.jar
    command: ["sh", "-lc", "sleep infinity"]

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    depends_on:
      - clickhouse
      - mongodb
      - kafka
      - airflow
    working_dir: /workspace
    ports:
      - "8001:8001"
    volumes:
      - ./:/workspace
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-only-change-me}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-1}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      - API_TOKEN=${API_TOKEN:-}
      - API_TOKEN_USER=${API_TOKEN_USER:-api}
      - DATABASE_URL=${DATABASE_URL:-}
      - JOB_WORKDIR=${JOB_WORKDIR:-/workspace}
      - JOB_TIMEOUT_SECONDS=${JOB_TIMEOUT_SECONDS:-1800}
      - MONGO_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB}?authSource=admin
      - MONGO_DB=${MONGO_DB}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-clickhouse}
      - CLICKHOUSE_PORT=${CLICKHOUSE_HTTP_PORT:-8123}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DB_RAW=${CLICKHOUSE_DB_RAW:-probablyfresh_raw}
      - CLICKHOUSE_DB_MART=${CLICKHOUSE_DB_MART:-probablyfresh_mart}
      - CH_HOST=${CH_HOST:-clickhouse}
      - CH_PORT=${CH_PORT:-8123}
      - CH_USER=${CH_USER:-default}
      - CH_PASSWORD=${CH_PASSWORD:-}
      - CH_DATABASE=${CH_DATABASE:-probablyfresh_mart}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_REGION=${MINIO_REGION:-ru-3}
      - MINIO_BUCKET=${MINIO_BUCKET:-analytics}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - S3_REGION=${S3_REGION:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_OBJECT_PREFIX=${S3_OBJECT_PREFIX:-}
      - AIRFLOW_BASE_URL=${AIRFLOW_BASE_URL:-http://airflow:8080}
      - AIRFLOW_USER=${AIRFLOW_USER:-admin}
      - AIRFLOW_PASSWORD=${AIRFLOW_PASSWORD:-admin}
      - AIRFLOW_DAG_ID=${AIRFLOW_DAG_ID:-etl_to_s3_daily}
      - GRAFANA_URL=${GRAFANA_URL:-http://grafana:3000}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    command:
      - sh
      - -lc
      - |
        python backend/manage.py migrate &&
        python backend/manage.py ensure_api_token &&
        python backend/manage.py runserver 0.0.0.0:8001

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  grafana:
    image: grafana/grafana:11.1.0
    depends_on:
      - clickhouse
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards

volumes:
  mongodb_data:
  airflow_postgres_data:
  clickhouse_data:
  grafana_data:
